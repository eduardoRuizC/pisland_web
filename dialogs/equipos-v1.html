<dialog
  class="trailer-modal"
  aria-labelledby="equipos-modal-title"
  aria-describedby="equipos-modal-description"
  data-trailer-modal
>
  <button class="modal-close" type="button" aria-label="Cerrar anuncio de los equipos" data-close-trailer-modal>
    <span class="material-symbols-outlined" aria-hidden="true">close</span>
  </button>
  <div class="trailer-modal-content">
    <div class="section-heading">
      <h2 id="equipos-modal-title">¡Equipos revelados!</h2>
      <span aria-hidden="true"></span>
    </div>
    <p class="trailer-modal-copy" id="equipos-modal-description">
      Ya puedes conocer a los equipos que se enfrentarán en Pisland. Dale al play y descubre quiénes defenderán cada escudo.
    </p>
    <div class="trailer-embed announcement-video">
      <video controls autoplay muted playsinline preload="metadata">
        <source src="assets/teams/TeamPresentacion.mp4" type="video/mp4">
        Tu navegador no puede reproducir este vídeo.
      </video>
    </div>
    <a class="attendance-button trailer-modal-link" href="#partido" data-close-trailer-modal>
      Ver equipos
    </a>
  </div>
</dialog>
