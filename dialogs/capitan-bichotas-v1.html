<dialog
  class="trailer-modal captain-announcement"
  aria-labelledby="capitan-bichotas-title"
  aria-describedby="capitan-bichotas-description"
  data-trailer-modal
>
  <button class="modal-close" type="button" aria-label="Cerrar anuncio del capitán de Bichotas" data-close-trailer-modal>
    <span class="material-symbols-outlined" aria-hidden="true">close</span>
  </button>
  <div class="trailer-modal-content">
    <div class="captain-announcement__logo-frame">
      <img
        class="captain-announcement__logo"
        src="assets/teams/bichotas/bichotas-logo.png"
        alt="Logo de Bichotas"
      >
    </div>
    <div class="section-heading">
      <h2 id="capitan-bichotas-title" data-fit-dialog-title>Capitán de Bichotas</h2>
      <span aria-hidden="true"></span>
    </div>
    <p class="trailer-modal-copy" id="capitan-bichotas-description">
      Hoy se presenta la abeja reina, la capitana de las Bichotas:
      <strong class="captain-announcement__captain">Geen</strong>.
      ¿Será capaz de liderar al enjambre hasta la victoria?
    </p>
    <div class="captain-announcement__short">
      <iframe width="610" height="816" src="https://www.youtube.com/embed/bIOHcRA9RZ8" title="geen capitana de bichotas" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <a class="attendance-button trailer-modal-link" href="?team=team-b#partido" data-close-trailer-modal>
      Ver Bichotas en Partido
    </a>
  </div>
</dialog>
