<dialog
  class="trailer-modal captain-announcement"
  aria-labelledby="capitan-rompediscotecas-title"
  aria-describedby="capitan-rompediscotecas-description"
  data-trailer-modal
>
  <button class="modal-close" type="button" aria-label="Cerrar anuncio del capitán de Rompediscotecas" data-close-trailer-modal>
    <span class="material-symbols-outlined" aria-hidden="true">close</span>
  </button>
  <div class="trailer-modal-content">
    <div class="captain-announcement__logo-frame">
      <img
        class="captain-announcement__logo"
        src="assets/teams/rompediscotecas/rompediscotecas-logo.png"
        alt="Logo de Rompediscotecas"
      >
    </div>
    <div class="section-heading">
      <h2 id="capitan-rompediscotecas-title" data-fit-dialog-title>Capitán de Rompediscotecas</h2>
      <span aria-hidden="true"></span>
    </div>
    <p class="trailer-modal-copy" id="capitan-rompediscotecas-description">
      Que suba el volumen y tiemble la pista. Hoy presentamos al capitán y martillo de los
      Rompediscotecas: <strong class="captain-announcement__captain">Indio</strong>.
      ¿Será capaz de marcar el ritmo y llevar a su equipo hasta la victoria?
    </p>
    <div class="captain-announcement__short">
      <iframe width="449" height="600" src="https://www.youtube.com/embed/FedAl3DwtU8" title="indio capitan rompediscotecas" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <a class="attendance-button trailer-modal-link" href="?team=team-a#partido" data-close-trailer-modal>
      Ver Rompediscotecas en Partido
    </a>
  </div>
</dialog>
