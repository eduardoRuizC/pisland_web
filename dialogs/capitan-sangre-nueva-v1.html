<dialog
  class="trailer-modal captain-announcement"
  aria-labelledby="capitan-sangre-nueva-title"
  aria-describedby="capitan-sangre-nueva-description"
  data-trailer-modal
>
  <button class="modal-close" type="button" aria-label="Cerrar anuncio del capitán de Sangre Nueva" data-close-trailer-modal>
    <span class="material-symbols-outlined" aria-hidden="true">close</span>
  </button>
  <div class="trailer-modal-content">
    <div class="captain-announcement__logo-frame">
      <img
        class="captain-announcement__logo"
        src="assets/teams/sangre-nueva/sangre-nueva-logo.png"
        alt="Logo de Sangre Nueva"
      >
    </div>
    <div class="section-heading">
      <h2 id="capitan-sangre-nueva-title" data-fit-dialog-title>Capitán de Sangre Nueva</h2>
      <span aria-hidden="true"></span>
    </div>
    <p class="trailer-modal-copy" id="capitan-sangre-nueva-description">
      Una nueva generación entra en juego dispuesta a dejar huella. Al frente de
      Sangre Nueva estará <strong class="captain-announcement__captain">Jugador D1</strong>.
      ¿Logrará transformar su ambición en la sorpresa del torneo?
    </p>
    <div class="captain-announcement__short">
      <iframe
        title="Short del capitán de Sangre Nueva pendiente de añadir"
        loading="lazy"
        tabindex="-1"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
        data-youtube-short
      ></iframe>
      <p class="captain-announcement__short-placeholder">Short pendiente de añadir</p>
    </div>
    <a class="attendance-button trailer-modal-link" href="?team=team-d#partido" data-close-trailer-modal>
      Ver Sangre Nueva en Partido
    </a>
  </div>
</dialog>
