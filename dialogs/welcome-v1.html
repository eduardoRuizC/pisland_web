<dialog class="trailer-modal" aria-labelledby="trailer-modal-title" data-trailer-modal>
  <button class="modal-close" type="button" aria-label="Cerrar trailer" data-close-trailer-modal>
    <span class="material-symbols-outlined" aria-hidden="true">close</span>
  </button>
  <div class="trailer-modal-content">
    <div class="section-heading">
      <h2 id="trailer-modal-title">Welcome</h2>
      <span aria-hidden="true"></span>
    </div>
    <p class="trailer-modal-copy">
      Bienvenido a Pisland Party, el evento de Julio. Revisa Próximos Chismes para ver las próximas actualizaciones.
    </p>
    <a class="attendance-button trailer-modal-link" href="#lineup" data-close-trailer-modal>
      Ver Próximos Chismes
    </a>
    <p class="trailer-modal-copy">
      Próximamente los equipos y alineaciones de los invitados. Mantente atento a las actualizaciones.
    </p>
    <div class="trailer-embed">
      <iframe
        src="https://www.youtube.com/embed/Mat6b35yoWw"
        title="Tráiler de Pisland Party"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
  </div>
</dialog>
