<dialog
  class="trailer-modal captain-announcement"
  aria-labelledby="capitan-gargolas-title"
  aria-describedby="capitan-gargolas-description"
  data-trailer-modal
>
  <button class="modal-close" type="button" aria-label="Cerrar anuncio del capitán de Gargolas" data-close-trailer-modal>
    <span class="material-symbols-outlined" aria-hidden="true">close</span>
  </button>
  <div class="trailer-modal-content">
    <div class="captain-announcement__logo-frame">
      <img
        class="captain-announcement__logo"
        src="assets/teams/gargolas/gargolas-logo.png"
        alt="Logo de Gargolas"
      >
    </div>
    <div class="section-heading">
      <h2 id="capitan-gargolas-title" data-fit-dialog-title>Capitán de Gargolas</h2>
      <span aria-hidden="true"></span>
    </div>
    <p class="trailer-modal-copy" id="capitan-gargolas-description">
      Desde lo más alto, una figura vigila el campo. Hoy despierta el capitán de
      Gargolas: <strong class="captain-announcement__captain">Ivan</strong>.
      ¿Conseguirá convertir su fortaleza en un territorio imposible de conquistar?
    </p>
    <div class="captain-announcement__short">
      <iframe width="449" height="600" src="https://www.youtube.com/embed/cgw_VPIJFfA" title="ivan capitan de gargolas" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <a class="attendance-button trailer-modal-link" href="?team=team-c#partido" data-close-trailer-modal>
      Ver Gargolas en Partido
    </a>
  </div>
</dialog>
