name: Deploy GitHub Pages - Scheduled

on:
  schedule:
    - cron: "*/1 * * * *"
      timezone: "Europe/Madrid"
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run the workflow'
        required: true
        type: string
        default: 'in 1 hour'

  workflow_call:
    inputs:
      manual_deployment:
        description: Allow deployment outside the scheduled date window
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deployment-window:
    name: Check deployment window
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.window.outputs.enabled }}
    steps:
      - name: Allow manual calls or the 2026 schedule window
        id: window
        env:
          MANUAL_DEPLOYMENT: ${{ inputs.manual_deployment }}
        run: |
          if [ "$MANUAL_DEPLOYMENT" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_date="$(TZ=Europe/Madrid date +%F)"
          if [[ "$current_date" < "2026-07-15" || "$current_date" > "2026-07-25" ]]; then
            echo "Scheduled deployment is disabled for ${current_date}."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

  build:
    needs: deployment-window
    if: needs.deployment-window.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p _site
          cp index.html styles.css .nojekyll _site/
          cp -R assets dialogs js news teams _site/
          cat > _site/config.js <<EOF
          window.PISLAND_CONFIG = {
            supabaseUrl: "${SUPABASE_URL}",
            supabaseAnonKey: "${SUPABASE_ANON_KEY}"
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
